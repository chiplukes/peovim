name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open peovim with `peovim file.py`
        2. Press ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `uv run python -c "import sys, platform; print(sys.version, platform.platform())"` and paste the output.
      placeholder: |
        Python version: 3.13.x
        OS: Windows 11 / Ubuntu 24.04 / ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Any relevant log output or screenshots. Log file is at `%APPDATA%\peovim\peovim.log` (Windows) or `~/.local/share/peovim/peovim.log` (Linux).
